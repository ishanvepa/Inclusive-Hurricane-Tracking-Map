<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hurricane Michael: Sonification Fix</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/data.js"></script>
    <script src="https://code.highcharts.com/modules/sonification.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <style>
        body { font-family: sans-serif; margin: 30px; background-color: #f8f9fa; }
        .container-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; }
        #container { width: 100%; height: 550px; }
        .controls { text-align: center; margin-bottom: 20px; }
        button { background: #28a745; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container-box">
    <div class="controls">
        <button id="playButton">🔊 PLAY SONIFICATION</button>
    </div>
    <div id="container"></div>
</div>

<script>
Highcharts.chart('container', {
    data: {
        // Link to your CSV file
        csvURL: window.location.origin + '/hurricane_michael_data.csv',
        
        // Map specific CSV columns to series
        // 0=time, 6=vmax, 7=mslp, 3=type
        seriesMapping: [
            { x: 0, y: 6, stormType: 3 }, // Series 0: Wind Speed
            { x: 0, y: 7, stormType: 3 }  // Series 1: Pressure
        ],
        
        parseDate: function (dateStr) {
            const [d, t] = dateStr.split(' ');
            const [day, month, year] = d.split('-');
            return Date.parse(`${year}-${month}-${day}T${t}`);
        },
        
        complete: function (options) {
            // Fix "Spaghetti": Remove all series except the 2 we mapped
            // Highcharts automatically adds every column as a series, 
            // but our mapped ones are always at the start.
            options.series = options.series.slice(0, 2);
            
            // Apply IDs so the sonification tracks can find them
            options.series[0].id = 'wind';
            options.series[0].name = 'Wind Speed (knots)';
            options.series[0].color = '#007bff';
            
            options.series[1].id = 'pressure';
            options.series[1].name = 'Central Pressure (hPa)';
            options.series[1].color = '#dc3545';
            options.series[1].yAxis = 1;
            options.series[1].dashStyle = 'ShortDash';
        }
    },
    chart: { type: 'spline' },
    title: { text: 'Hurricane Michael: Wind & Pressure Profile' },
    xAxis: { type: 'datetime' },
    yAxis: [{ 
        title: { text: 'Wind Speed (knots)', style: { color: '#007bff' } }
    }, { 
        title: { text: 'Pressure (hPa)', style: { color: '#dc3545' } },
        opposite: true,
        reversed: true 
    }],
    sonification: {
        duration: 12000,
        order: 'simultaneous',
        tracks: [
            {
                instrument: 'piano',
                series: 'wind',
                mapping: { pitch: { mapTo: 'y', min: 'c2', max: 'c6' }, volume: 0.7 }
            },
            {
                instrument: 'flute',
                series: 'pressure',
                mapping: { pitch: { mapTo: 'y', min: 'g6', max: 'g3' }, volume: 0.4 }
            },
            {
                type: 'speech',
                series: 'wind',
                mapping: { 
                    text: 'Category: {point.stormType}', 
                    rate: 2 
                },
                condition: function (point) {
                    const prev = point.series.points[point.index - 1];
                    return !prev || prev.stormType !== point.stormType;
                }
            }
        ]
    }
});

document.getElementById('playButton').onclick = () => {
    const chart = Highcharts.charts[0];
    if (chart) chart.sonify();
};
</script>
</body>
</html>
